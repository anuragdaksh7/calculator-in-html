<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link href="style.css" rel="stylesheet">
		<script type="text/javascript" src="script.js"></script>

		<title></title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono:wght@800&display=swap" rel="stylesheet">
	</head>

	<body>

		<div class="container">
			<div class="searchbox">

				<input class="search"  id= "enter" value="0" type="text" placeholder="0">
			</div>
			<div id="rows" class="row1">
				<button id="hm" onclick="gif()">[x]</sup></button>
				<button id="hm" onclick="ff()">{x}</button>
				<button id="hm" class="sqrt" onclick="sqrt()">√</button>
				<button class="ac" onclick="ac()">AC</button>
				<button id="hm" class="sq" onclick="sq()">x<sup>2</sup></button>
				<button id="hm" class="modulo" onclick="modulo()">%</button>
				<button id="hm" class="divide" onclick="divide()">÷</button>
			</div>
			<div id="rows" class="row2">
				<button id="hm" onclick="sin()">sin</button>
				<button id="hm" onclick="cos()">cos</button>
				<button id="hm" onclick="tan()">tan</button>
				<button id="hm" class="seven" onclick="seven()">7</button>
				<button id="hm" class="eight" onclick="eight()">8</button>
				<button id="hm" class="nine" onclick="nine()">9</button>
				<button id="hm" class="multi" onclick="multi()">×</button>
			</div>
			<div id="rows" class="row3">
				<button id="hm" onclick="ln()">ln</button>
				<button id="hm" onclick="log()">log</button>
				<button id="hm" onclick="inv()">1/x</button>
				<button id="hm" class="four" onclick="four()">4</button>
				<button id="hm" class="five" onclick="five()">5</button>
				<button id="hm" class="six" onclick="six()">6</button>
				<button id="hm" class="minus" onclick="minus()">-</button>
			</div>
			<div id="rows" class="row4">
				<button id="hm" onclick="ex()">e<sup>x</sup></button>
				<button id="hm" onclick="fact()">!</button>
				<button id="hm" onclick="self()">x<sup>x</sup></button>
				<button id="hm" class="one" onclick="one()">1</button>
				<button id="hm" class="two" onclick="two()">2</button>
				<button id="hm" class="three" onclick="three()">3</button>
				<button id="hm" class="plus" onclick="add()">+</button>
			</div>
			<div id="rows" class="row5">
				<button id="hm" onclick="mod()">|x|</button>
				<button id="hm" onclick="pie()">π</button>
				<button id="hm" onclick="ee()">e</button>
				<button id="hm" class="plusminus" onclick="plusminus()">+/-</button>
				<button id="hm" class="zero" onclick="zero()">0</button>
				<button id="hm" class="decimal" onclick="decimal()">.</button>
				<button id="hm" class="equal" onclick="sub()">=</button>
			</div>
		</div>



	</body>



</html>
